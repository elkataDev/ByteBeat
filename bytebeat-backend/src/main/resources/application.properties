# Nombre de la app
spring.application.name=bytebeat

# Configuración de la conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bytebeat?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# Driver de MySQL para Java
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate / JPA
# 'update' hace que Hibernate cree las tablas automáticamente en MySQL según tus clases de Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect